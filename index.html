<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="کتابخانه جنوب">
    <meta name="keywords" content="فردوسی, شاهنامه, حکیم ابوالقاسم فردوسی, توس, حماسهسرا, داستانهای ملی, رستم و سهراب, سیمرغ, کیخسرو, زال, رودابه, اسفندیار, اخلاق پهلوانی, ایران باستان, زبان فارسی دری, مثنوی, غزنیات, دیوان حافظ, لسانالغیب, حافظ شیرازی, غزل عرفانی, فال حافظ, ساقینامه, خواجه شیراز, رندی, قلندری, عرفان حافظ, طنز حافظ, ایهام, تناسب, موسیقی شعر, سعدی شیرازی, بوستان, گلستان, شیخ اجل, نصیحت, اخلاق عملی, حکایت, پند و اندرز, عشق زمینی, عشق آسمانی, طیبات, بدایع, خواتیم, غزلیات سعدی, نثر مسجع, کلیله و دمنه, مولانا جلالالدین, مولوی, مثنوی معنوی, دیوان شمس تبریزی, شمس تبریز, غزلیات مولوی, سماع, عشق الهی, وحدت وجود, نی نامه, دفتر اول تا ششم, رباعیات, فیه ما فیه, مجالس سبعه, مکاتیب, اسرار مثنوی, تمثیل, استعاره عرفانی, هجرت, وصال, شمس و مولانا, داستان پادشاه و کنیزک, داستان پیل در خانه تاریک, عقل و عشق, ترجیعبند, ترکیببند, قالبهای شعری, وزن شعر, قافیه, ردیف, صنایع بدیعی, تشبیه, کنایه, مجاز, جناس, تضاد, اغراق, ادبیات کلاسیک, شعر پارسی, فرهنگ ایرانی, اخلاق و عرفان, حکمت ایرانی, زیباییشناسی کلام, تفسیر قرآن در شعر, اسطورهپردازی, عرفان عملی, مکتب وقوع, سبک عراقی, سبک خراسانی, سبک هندی, نقد ادبی, شرح و تفسیر غزلیات, فرهنگ واژگان, اصطلاحات عرفانی, داستانپردازی, نثر ادبی, شعر تعلیمی, شعر غنایی">
    <title>کتابخانه جنوب</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tahoma', sans-serif;
            direction: rtl;
            padding: 40px 20px;
            background: #f5efe8;
            color: #3d2b15;
            transition: background 0.4s, color 0.4s;
        }
        /* حالت شب */
        body.dark-mode {
            background: #1a1a2e;
            color: #e0e0e0;
        }
        body.dark-mode .container {
            background: #252540;
            border-right-color: #c9a77b;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        body.dark-mode h1 {
            color: #f0e0c8;
            border-bottom-color: #8B5A2B;
        }
        body.dark-mode .sub {
            color: #c9b8a5;
        }
        body.dark-mode th {
            background: #3d2b15;
            color: #f0e0c8;
        }
        body.dark-mode td {
            border-bottom-color: #4a3a2a;
        }
        body.dark-mode tr:hover {
            background: #3a2a1a;
        }
        body.dark-mode a {
            color: #d4b48c;
        }
        body.dark-mode a:hover {
            color: #f0d8b0;
        }
        body.dark-mode .footer {
            border-top-color: #4a3a2a;
            color: #b0a090;
        }
        body.dark-mode .theme-btn {
            background: #d4b48c;
            color: #1a1a2e;
        }
        .container {
            max-width: 900px;
            margin: auto;
            background: #fffcf7;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border-right: 6px solid #8B5A2B;
            transition: background 0.4s, border-color 0.4s, box-shadow 0.4s;
        }
        h1 {
            font-size: 32px;
            color: #3d2b15;
            border-bottom: 3px solid #c9a77b;
            padding-bottom: 15px;
            text-align: center;
            transition: color 0.4s, border-color 0.4s;
        }
        .sub {
            text-align: center;
            color: #7a5f3e;
            margin: 15px 0 30px;
            font-size: 18px;
            transition: color 0.4s;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            text-align: right;
            padding: 14px 12px;
            border-bottom: 1px solid #e8ddd0;
            transition: background 0.3s, border-color 0.4s, color 0.4s;
        }
        th {
            background: #d4c5b2;
            color: #3d2b15;
        }
        tr:hover {
            background: #f5ede4;
        }
        a {
            text-decoration: none;
            color: #6b3a1f;
            font-weight: 500;
            transition: color 0.3s;
        }
        a:hover {
            color: #8B4513;
            text-decoration: underline;
        }
        .folder::before { content: "📁 "; }
        .footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
            text-align: center;
            color: #8a7a6a;
            font-size: 14px;
            transition: border-color 0.4s, color 0.4s;
        }

        /* دکمه تغییر تم */
        .theme-btn {
            display: inline-block;
            margin-bottom: 20px;
            padding: 12px 28px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            background: #8B5A2B;
            color: #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            transition: all 0.3s;
        }
        .theme-btn:hover {
            transform: scale(1.04);
            box-shadow: 0 6px 25px rgba(0,0,0,0.25);
        }
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 10px;
        }
        /* ریسپانسیو */
        @media (max-width: 600px) {
            .container { padding: 20px; }
            h1 { font-size: 24px; }
            .header-top { flex-direction: column; align-items: stretch; }
            .theme-btn { width: 100%; text-align: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-top">
            <h1>📚 کتابخانه جنوب</h1>
            <button class="theme-btn" id="themeToggle">🌙 حالت شب</button>
        </div>
        <p class="sub">گنجینه‌ای از ادبیات کهن پارسی</p>

        <table>
            <thead>
                <tr>
                    <th>نام</th>
                    <th>توضیحات</th>
                </tr>
            </thead>
            <tbody>
                <tr><td class="folder"><a href="فردوسی/">فردوسی</a></td><td>حکیم ابوالقاسم فردوسی - شاهنامه</td></tr>
                <tr><td class="folder"><a href="سعدی/">سعدی</a></td><td>شیخ مصلح‌الدین سعدی - گلستان و بوستان</td></tr>
                <tr><td class="folder"><a href="حافظ/">حافظ</a></td><td>خواجه شمس‌الدین حافظ - دیوان اشعار</td></tr>
                <tr><td class="folder"><a href="مولوی/">مولوی</a></td><td>جلال‌الدین محمد بلخی - مثنوی معنوی</td></tr>
                <tr><td class="folder"><a href="خیام/">خیام</a></td><td>عمر خیام نیشابوری - رباعیات</td></tr>
            </tbody>
        </table>

        <div class="footer">📖</div>
    </div>

    <script>
        const body = document.body;
        const btn = document.getElementById('themeToggle');

        // ===== کلید یکسان برای همه صفحات =====
        const THEME_KEY = 'globalTheme';

        // بررسی حالت ذخیره‌شده در مرورگر
        if (localStorage.getItem(THEME_KEY) === 'dark') {
            body.classList.add('dark-mode');
            btn.textContent = '☀️ حالت روز';
        }

        btn.addEventListener('click', () => {
            body.classList.toggle('dark-mode');

            if (body.classList.contains('dark-mode')) {
                btn.textContent = '☀️ حالت روز';
                localStorage.setItem(THEME_KEY, 'dark');
            } else {
                btn.textContent = '🌙 حالت شب';
                localStorage.setItem(THEME_KEY, 'light');
            }
        });
    </script>
</body>
</html>
