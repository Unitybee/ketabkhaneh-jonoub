<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>کتابخانه جنوب</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tahoma', sans-serif;
            background: #f5efe8;
            direction: rtl;
            padding: 40px 20px;
        }
        .container {
            max-width: 900px;
            margin: auto;
            background: #fffcf7;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border-right: 6px solid #8B5A2B;
        }
        h1 {
            font-size: 32px;
            color: #3d2b15;
            border-bottom: 3px solid #c9a77b;
            padding-bottom: 15px;
            text-align: center;
        }
        .sub {
            text-align: center;
            color: #7a5f3e;
            margin: 15px 0 30px;
            font-size: 18px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            text-align: right;
            padding: 14px 12px;
            border-bottom: 1px solid #e8ddd0;
        }
        th {
            background: #d4c5b2;
            color: #3d2b15;
        }
        tr:hover {
            background: #f5ede4;
        }
        a {
            text-decoration: none;
            color: #6b3a1f;
            font-weight: 500;
        }
        a:hover {
            color: #8B4513;
            text-decoration: underline;
        }
        .folder::before { content: "📁 "; }
        .footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
            text-align: center;
            color: #8a7a6a;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 کتابخانه جنوب</h1>
        <p class="sub">گنجینه‌ای از ادبیات کهن پارسی</p>

        <table>
            <thead>
                <tr>
                    <th>نام</th>
                    <th>توضیحات</th>
                </tr>
            </thead>
            <tbody>
                <tr><td class="folder"><a href="فردوسی/">فردوسی</a></td><td>حکیم ابوالقاسم فردوسی - شاهنامه</td></tr>
                <tr><td class="folder"><a href="سعدی/">سعدی</a></td><td>شیخ مصلح‌الدین سعدی - گلستان و بوستان</td></tr>
                <tr><td class="folder"><a href="حافظ/">حافظ</a></td><td>خواجه شمس‌الدین حافظ - دیوان اشعار</td></tr>
                <tr><td class="folder"><a href="مولوی/">مولوی</a></td><td>جلال‌الدین محمد بلخی - مثنوی معنوی</td></tr>
                <tr><td class="folder"><a href="خیام/">خیام</a></td><td>عمر خیام نیشابوری - رباعیات</td></tr>
            </tbody>
        </table>

        <div class="footer">📖</div>
    </div>
</body>
</html>
