<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>کیخسرو - شاهنامه فردوسی</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Vazirmatn', 'Tahoma', sans-serif;
            background: #f5efe8;
            direction: rtl;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: background 0.4s;
        }
        /* ===== حالت شب ===== */
        body.dark-mode {
            background: #1a1a2e;
            color: #e0e0e0;
        }
        body.dark-mode .container {
            background: #252540;
            border-right-color: #c9a77b;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        body.dark-mode h1 {
            color: #f0e0c8;
            border-bottom-color: #8B5A2B;
        }
        body.dark-mode .back {
            color: #d4b48c;
        }
        body.dark-mode .back:hover {
            color: #f0d8b0;
        }
        body.dark-mode .footer {
            border-top-color: #4a3a2a;
            color: #b0a090;
        }
        body.dark-mode .theme-btn {
            background: #d4b48c;
            color: #1a1a2e;
        }
        body.dark-mode .poem-box {
            background: #2a2a45;
            border-color: #4a3a2a;
        }
        body.dark-mode .poem-box p {
            color: #f0e0c8;
        }

        .container {
            max-width: 800px;
            margin: auto;
            background: #fffcf7;
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border-right: 6px solid #8B5A2B;
            text-align: center;
            line-height: 2.8;
            font-size: 22px;
            transition: background 0.4s, border-color 0.4s, box-shadow 0.4s;
        }
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 10px;
        }
        .theme-btn {
            padding: 10px 24px;
            font-size: 15px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            background: #8B5A2B;
            color: #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            transition: all 0.3s;
            white-space: nowrap;
        }
        .theme-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 25px rgba(0,0,0,0.25);
        }
        h1 {
            font-size: 32px;
            color: #3d2b15;
            border-bottom: 3px solid #c9a77b;
            padding-bottom: 15px;
            margin-bottom: 30px;
            text-align: center;
            font-weight: 700;
            transition: color 0.4s, border-color 0.4s;
        }
        .back {
            display: inline-block;
            margin-top: 30px;
            color: #6b3a1f;
            font-weight: bold;
            font-size: 16px;
            text-decoration: none;
            transition: color 0.3s;
        }
        .back:hover {
            text-decoration: underline;
        }
        .footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
            text-align: center;
            color: #8a7a6a;
            font-size: 14px;
            transition: border-color 0.4s, color 0.4s;
        }
        .hero-icon {
            font-size: 48px;
            display: block;
            text-align: center;
            margin-bottom: 10px;
        }

        /* ===== باکس مخصوص شعر ===== */
        .poem-box {
            background: #f9f5ef;
            border: 2px solid #d4c5b2;
            border-radius: 16px;
            padding: 40px 35px;
            margin: 20px 0;
            text-align: center;
            transition: background 0.4s, border-color 0.4s;
        }
        .poem-box p {
            font-size: 24px;
            line-height: 3;
            color: #3d2b15;
            margin-bottom: 5px;
            transition: color 0.4s;
        }
        .poem-box .beyt {
            font-weight: 700;
            font-size: 26px;
        }

        @media (max-width: 600px) {
            .container { padding: 25px 20px; font-size: 18px; }
            h1 { font-size: 24px; }
            .header-top { flex-direction: column; align-items: stretch; }
            .theme-btn { width: 100%; text-align: center; }
            .poem-box p { font-size: 20px; }
            .poem-box .beyt { font-size: 22px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-top">
            <a href="./" class="back">← بازگشت به فردوسی</a>
            <button class="theme-btn" id="themeToggle">🌙 حالت شب</button>
        </div>

        <span class="hero-icon">🧙</span>
        <h1>کیخسرو</h1>

        <!-- ===== فقط شعر ===== -->
        <div class="poem-box">
            <p class="beyt">توانا بود هر که دانا بود</p>
            <p>ز دانش دل پیر برنا بود</p>
            <p style="margin-top: 20px; font-size: 18px; opacity: 0.6;">
                — فردوسی، شاهنامه
            </p>
        </div>

        <br />
        <a href="../فردوسی/" class="back">← بازگشت به کتابخانه فردوسی</a>

        <div class="footer">📖 کتابخانه جنوب - تمامی حقوق محفوظ است</div>
    </div>

    <script>
        const body = document.body;
        const btn = document.getElementById('themeToggle');
        const THEME_KEY = 'globalTheme';

        if (localStorage.getItem(THEME_KEY) === 'dark') {
            body.classList.add('dark-mode');
            btn.textContent = '☀️ حالت روز';
        }

        btn.addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            if (body.classList.contains('dark-mode')) {
                btn.textContent = '☀️ حالت روز';
                localStorage.setItem(THEME_KEY, 'dark');
            } else {
                btn.textContent = '🌙 حالت شب';
                localStorage.setItem(THEME_KEY, 'light');
            }
        });
    </script>
</body>
</html>
